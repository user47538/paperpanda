services:
  - type: web
    name: paperpanda-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: paperpanda-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: paperpanda-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: paperpanda-api
          envVarKey: RENDER_EXTERNAL_URL
